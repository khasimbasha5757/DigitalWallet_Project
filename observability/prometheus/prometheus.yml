global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8090"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8082"]

  - job_name: wallet-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["wallet-service:8083"]

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["transaction-service:8084"]

  - job_name: rewards-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["rewards-service:8085"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8086"]

  - job_name: admin-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["admin-service:8087"]

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:8888"]

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server:8761"]
