name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_images:
        description: "Build and push Docker images to GitHub Container Registry"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/digitalwallet
  SERVICES: eureka-server config-server api-gateway auth-service user-service wallet-service transaction-service rewards-service notification-service admin-service

jobs:
  publish-backend-images:
    name: Publish backend Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' || inputs.push_images == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service images
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          OWNER="$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')"

          for SERVICE in ${SERVICES}; do
            IMAGE="${REGISTRY}/${OWNER}-${SERVICE}"
            docker build \
              --build-arg SERVICE_MODULE="${SERVICE}" \
              --tag "${IMAGE}:${SHORT_SHA}" \
              --tag "${IMAGE}:latest" \
              .
            docker push "${IMAGE}:${SHORT_SHA}"
            docker push "${IMAGE}:latest"
          done

  frontend:
    name: Build and publish frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        if: github.event_name == 'push' || inputs.push_images == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          OWNER="$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${REGISTRY}/${OWNER}-frontend"

          docker build \
            --tag "${IMAGE}:${SHORT_SHA}" \
            --tag "${IMAGE}:latest" \
            ./frontend
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"
