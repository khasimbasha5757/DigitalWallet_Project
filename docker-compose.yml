services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: eureka-server
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8761:8761"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: config-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_REPO_URI: file:/app/config-repo
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_auth
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      NOTIFICATION_INTERNAL_EMAIL_URL: http://notification-service:8086/api/notifications/internal/email
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_user
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      GATEWAY_BASE_URL: http://api-gateway:8090
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      api-gateway:
        condition: service_started
    restart: unless-stopped

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: transaction-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_tx
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: unless-stopped

  rewards-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: rewards-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_rewards
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      WALLET_INTERNAL_BASE_URL: http://wallet-service:8083/api/wallet/internal
      NOTIFICATION_INTERNAL_BASE_URL: http://notification-service:8086/api/notifications/internal
      ADMIN_INTERNAL_BASE_URL: http://admin-service:8087/api/admin
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_notification
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: admin-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_user
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      GATEWAY_BASE_URL: http://api-gateway:8090
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      api-gateway:
        condition: service_started
    restart: unless-stopped

  wallet-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: wallet-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digital_wallet_wallet
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRINGDOC_SERVER_URL: http://localhost:8090
      GATEWAY_BASE_URL: http://api-gateway:8090/api
      AUTH_INTERNAL_BASE_URL: http://auth-service:8081/api/auth/internal
      TX_INTERNAL_BASE_URL: http://transaction-service:8084/api/transactions/internal
      REWARDS_INTERNAL_BASE_URL: http://rewards-service:8085/api/rewards/internal
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      transaction-service:
        condition: service_started
      rewards-service:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: api-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
      - config-server
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:3.5.1
    user: "0"
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - api-gateway
      - auth-service
      - user-service
      - wallet-service
      - transaction-service
      - rewards-service
      - notification-service
      - admin-service
      - config-server
      - eureka-server
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  grafana-data:
