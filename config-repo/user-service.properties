server.port=8082
spring.application.name=user-service
springdoc.api-docs.path=/v3/api-docs
springdoc.server-url=http://localhost:8090

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/digital_wallet_user
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=User Profile Service
info.app.version=1.0.0
management.tracing.enabled=${TRACING_ENABLED:true}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# JWT Configuration
jwt.secret=aW1wb3J0YW50X3NlY3JldF9mb3Jfand0X3NpZ25pbmdfZG9tYWluX3dhbGxldA==

# Error Display
server.error.include-message=always

# KYC PDF uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
kyc.upload-dir=uploads/kyc
user.public-base-url=http://localhost:8090
